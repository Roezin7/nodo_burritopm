<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons: SVG moderno + fallbacks PNG + máscara de Safari (pestaña fijada) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="mask-icon" href="/mask-icon.svg" color="#5ea531" />
    <!-- Ícono de inicio en iOS (la PWA usa este, no el manifest) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- interactive-widget=resizes-content: en iOS 17.4+/Android, el teclado y la barra de
         Safari re-dimensionan el viewport en vez de solo "flotar" sobre el contenido; evita que
         la barra inferior y los paneles con posición fija queden mal ubicados o salten al abrir
         un campo de texto. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#faf8f4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15120e" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="NODO" />
    <meta name="apple-mobile-web-app-title" content="NODO" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Mosaicos de Windows -->
    <meta name="msapplication-TileColor" content="#15120e" />
    <meta name="msapplication-TileImage" content="/pwa-192.png" />

    <title>NODO · Burrito Parrilla</title>
    <meta
      name="description"
      content="NODO — sistema de abastecimiento de Burrito Parrilla Mexicana: bodega central, sucursales, inventarios y distribución en un solo flujo."
    />
    <meta name="author" content="Burrito Parrilla Mexicana" />

    <!-- Open Graph (al compartir el enlace en WhatsApp, redes, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NODO · Burrito Parrilla" />
    <meta property="og:title" content="NODO · Burrito Parrilla Mexicana" />
    <meta
      property="og:description"
      content="Abastecimiento centralizado: bodega, sucursales, inventarios y distribución en un solo flujo."
    />
    <meta property="og:locale" content="es_MX" />
    <meta property="og:url" content="https://burritopm.app/" />
    <meta property="og:image" content="https://burritopm.app/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Burrito Parrilla Mexicana" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NODO · Burrito Parrilla Mexicana" />
    <meta
      name="twitter:description"
      content="Abastecimiento centralizado: bodega, sucursales, inventarios y distribución en un solo flujo."
    />
    <meta name="twitter:image" content="https://burritopm.app/og-image.png" />

    <!-- Tipografía: UI fuerte (Hanken Grotesk), cuerpo (Inter), datos (IBM Plex Mono), wordmark script (Yellowtail) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Cormorant+Garamond:wght@500;600&family=Yellowtail&display=swap"
      rel="stylesheet"
    />

    <!-- Resuelve el tema antes de pintar para evitar parpadeo claro/oscuro -->
    <script>
      (function () {
        try {
          var guardado = localStorage.getItem('bpm-tema');
          var tema = guardado || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.dataset.tema = tema;
        } catch (e) {
          document.documentElement.dataset.tema = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
